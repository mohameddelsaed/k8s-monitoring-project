services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      - DB_HOST=db
      - DB_NAME=projectsdb
      - DB_USER=postgres
      - DB_PASSWORD=mysecretpassword
    depends_on:
      - db
  db:
    image: postgres:latest
    environment:
      - POSTGRES_DB=projectsdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
